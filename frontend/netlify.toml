[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://truematch-o121.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/ws"
  to = "wss://truematch-o121.onrender.com/ws"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
