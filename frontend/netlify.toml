[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://YOUR_RENDER_BACKEND_URL/api/:splat"
  status = 200

[[redirects]]
  from = "/ws"
  to = "wss://YOUR_RENDER_BACKEND_URL/ws"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
